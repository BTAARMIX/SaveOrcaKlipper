#####################################################################
# 	Mcu Configuration
#####################################################################

[mcu EBBT1]
canbus_uuid: d62aa84d97e8

#--------------------------------------------------------------------

[temperature_sensor MCuT1]
sensor_type: temperature_mcu
sensor_mcu: EBBT1
min_temp: 0
max_temp: 100
#--------------------------------------------------------------------

#####################################################################
# 	ADXL345 Accelerometer
#####################################################################

[adxl345]
cs_pin: EBBT1: PB12
spi_software_sclk_pin: EBBT1: PB10
spi_software_mosi_pin: EBBT1: PB11
spi_software_miso_pin: EBBT1: PB2
axes_map: x,y,z
#--------------------------------------------------------------------

#####################################################################
# 	E Stepper Settings
#####################################################################

[extruder1]
step_pin: EBBT1: PD0
dir_pin: !EBBT1: PD1
enable_pin: !EBBT1: PD2
heater_pin: EBBT1: PB13
sensor_pin: EBBT1: PA3
sensor_type: ATC Semitec 104GT-2

full_steps_per_rotation: 200
microsteps: 16
gear_ratio: 50:10
rotation_distance: 24
max_extrude_only_accel: 4000
max_extrude_only_velocity: 25

nozzle_diameter: 0.400
filament_diameter: 1.750

min_temp: 0
max_temp: 310

control: pid
pid_Kp: 49.734
pid_Ki: 12.280
pid_Kd: 50.355
#--------------------------------------------------------------------

[tmc2209 extruder1]
uart_pin: EBBT1: PA15
run_current: 0.56
stealthchop_threshold: 0
#--------------------------------------------------------------------

[autotune_tmc extruder] 
motor: moons-cse14hra1l410a 
tuning_goal: performance
#--------------------------------------------------------------------

#####################################################################
# 	Fan Control
#####################################################################


[heater_fan T1_hotend_fan]
pin: EBBT1: PA1
heater: extruder1
shutdown_speed: 1
heater_temp: 50.0
max_power: 1.0
fan_speed: 1.0

[fan_generic T1_partfan]
pin: EBBT1: PA0
kick_start_time: 0.2
off_below: 0.10
#--------------------------------------------------------------------

#####################################################################
# 	Leds
#####################################################################


[neopixel T1_leds]
pin: EBBT1:PD3
chain_count: 2
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 1
#--------------------------------------------------------------------

#####################################################################
# 	Runout
#####################################################################

[filament_switch_sensor t1_filament]
switch_pin: ^EBBT1:PB7
pause_on_runout: False

runout_gcode:
    {% if printer.toolhead.extruder == "extruder1" %}
        PAUSE
    {% endif %}
#--------------------------------------------------------------------

#####################################################################
# 	Tool
#####################################################################

[gcode_macro T1]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=1


#change the tool numbers to the tool you are configuring, ie T1, T1, etc
[tool T1]
#change this too
tool_number: 1
#if this were T1, then this would be extruder1, etc
extruder: extruder1
#Change T1_partfan to tool number
fan: T1_partfan
# Tool offset is 0.171875,-0.034375,-0.833750
gcode_x_offset: -0.60
gcode_y_offset: 0.60
gcode_z_offset: 0.20
#These are build specific, its where the tool is sititng in it's dock.
params_park_x: 17.25
params_park_y: -1.3
params_park_z: 300.700
# For InputShaper run per tool and enter the frequency here
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 46.8
params_input_shaper_damping_ratio_x: 0.059
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 36.8
params_input_shaper_damping_ratio_y: 0.059

[tool_probe T1]
pin: ^EBBT1:PB6
tool: 1
x_offset: 0 # X axis-sensor relative nozzle offset
y_offset: 0 # Y axis-sensor relative nozzle offset
z_offset: -0.7 # Z axis-sensor relative nozzle offset T0+0.031
# drop_first_result: True # enable is on danger-klipper
speed: 5.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder1 TEMP=150