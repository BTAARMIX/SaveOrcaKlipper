#####################################################################
# 	Mcu Configuration
#####################################################################

[mcu EBBT0]
canbus_uuid: 4d5965523ffb

#--------------------------------------------------------------------

[temperature_sensor MCuT0]
sensor_type: temperature_mcu
sensor_mcu: EBBT0
min_temp: 0
max_temp: 100
#--------------------------------------------------------------------

#####################################################################
# 	ADXL345 Accelerometer
#####################################################################

[adxl345]
cs_pin: EBBT0: PB12
spi_software_sclk_pin: EBBT0: PB10
spi_software_mosi_pin: EBBT0: PB11
spi_software_miso_pin: EBBT0: PB2
axes_map: x,y,z
#--------------------------------------------------------------------

#####################################################################
# 	E Stepper Settings
#####################################################################

[extruder]
step_pin: EBBT0: PD0
dir_pin: !EBBT0: PD1
enable_pin: !EBBT0: PD2
heater_pin: EBBT0: PB13
sensor_pin: EBBT0: PA3
sensor_type: ATC Semitec 104GT-2

full_steps_per_rotation: 200
microsteps: 16
gear_ratio: 50:10
rotation_distance: 24
max_extrude_only_accel: 4000
max_extrude_only_velocity: 25

nozzle_diameter: 0.400
filament_diameter: 1.750

min_temp: 0
max_temp: 310

control: pid
pid_Kp: 47.168
pid_Ki: 8.735
pid_Kd: 63.676
#--------------------------------------------------------------------

[tmc2209 extruder]
uart_pin: EBBT0: PA15
run_current: 0.56
stealthchop_threshold: 0
#--------------------------------------------------------------------

[autotune_tmc extruder] 
motor: moons-cse14hra1l410a 
tuning_goal: performance
#--------------------------------------------------------------------

#####################################################################
# 	Fan Control
#####################################################################


[heater_fan T0_hotend_fan]
pin: EBBT0: PA1
heater: extruder
shutdown_speed: 1
heater_temp: 50.0
max_power: 1.0
fan_speed: 1.0

[fan_generic T0_partfan]
pin: EBBT0: PA0
kick_start_time: 0.2
off_below: 0.10
#--------------------------------------------------------------------

#####################################################################
# 	Leds
#####################################################################


[neopixel T0_leds]
pin: EBBT0:PD3
chain_count: 2
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 1
#--------------------------------------------------------------------

#####################################################################
# 	Runout
#####################################################################

[filament_switch_sensor t0_filament]
switch_pin: ^EBBT0:PB7
pause_on_runout: False

runout_gcode:
    {% if printer.toolhead.extruder == "extruder" %}
        PAUSE
    {% endif %}
#--------------------------------------------------------------------

#####################################################################
# 	Tool
#####################################################################

[gcode_macro T0]
variable_active: 0
variable_color: ""
gcode:
    SELECT_TOOL T=0


#change the tool numbers to the tool you are configuring, ie T0, T1, etc
[tool T0]
#change this too
tool_number: 0
#if this were T1, then this would be extruder1, etc
extruder: extruder
#Change T0_partfan to tool number
fan: T0_partfan

#These are build specific, its where the tool is sititng in it's dock.
params_park_x: 335.20
params_park_y: -1.5
params_park_z: 301.700
# For InputShaper run per tool and enter the frequency here
params_input_shaper_type_x: 'mzv'
params_input_shaper_freq_x: 68.0
params_input_shaper_damping_ratio_x: 0.040
params_input_shaper_type_y: 'mzv'
params_input_shaper_freq_y: 36.4
params_input_shaper_damping_ratio_y: 0.034


[tool_probe T0]
pin: ^EBBT0:PB6
tool: 0
x_offset: 0 # X axis-sensor relative nozzle offset
y_offset: 0 # Y axis-sensor relative nozzle offset
# More positive = More Squish
z_offset = -0.730
speed: 10.0
samples: 2
samples_result: median
sample_retract_dist: 0.5
samples_tolerance: 0.005
samples_tolerance_retries: 3
activate_gcode:
    _TAP_PROBE_ACTIVATE HEATER=extruder TEMP=150