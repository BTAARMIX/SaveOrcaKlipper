#####################################################################
# 	Speed and Acceleration Settings
#####################################################################

[printer]
kinematics: corexy
max_velocity: 480 
max_accel: 15000  			#Max 4000
max_z_velocity: 40     #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 150
minimum_cruise_ratio: 0.5
square_corner_velocity: 5.0
##--------------------------------------------------------------------

[input_shaper]
shaper_freq_x: 58.8
shaper_type_x: mzv
damping_ratio_x: 0.062
shaper_freq_y: 38.2 
shaper_type_y: mzv
damping_ratio_y:0.056
##--------------------------------------------------------------------

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

## X Stepper on Motor1(B Motor)
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:200
#endstop_pin: EBBCan:gpio24
endstop_pin: PF4
position_min: 0
position_endstop: 354
position_max: 354
homing_speed: 100   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC13
interpolate: true

run_current: 0.9
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0


[autotune_tmc stepper_x]
motor: moons-ms17hd6p420i
tuning_goal : performance
##--------------------------------------------------------------------

## Y Stepper on Motor2 (A Motor)
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 16
rotation_distance: 40
endstop_pin: PF3
full_steps_per_rotation:200
position_min: -12
position_endstop: 345
position_max: 345
homing_speed: 100  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PE3
interpolate: true
run_current: 0.9
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_y]
motor: moons-ms17hd6p420i
tuning_goal : performance
##--------------------------------------------------------------------

#####################################################################
# 	Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left on MOTOR-3A
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 345
position_min: -3
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PB9
interpolate: true
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z]
motor: moons-ms17hd6p420i
tuning_goal : performance
##--------------------------------------------------------------------

##	Z1 Stepper - Rear Left on Motor5
[stepper_z1]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PG14
interpolate: true
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z1]
motor: moons-ms17hd6p420i
tuning_goal : performance
##--------------------------------------------------------------------

##	Z2 Stepper - Rear Right on Motor6
[stepper_z2]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PG10
interpolate: true
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z2]
motor: moons-ms17hd6p420i
tuning_goal : performance
##--------------------------------------------------------------------

##	Z3 Stepper - Front Right on Motor7
[stepper_z3]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: PD5
interpolate: true
run_current: 1.1
sense_resistor: 0.110
stealthchop_threshold: 0

[autotune_tmc stepper_z3]
motor: moons-ms17hd6p420i
tuning_goal : performance
##--------------------------------------------------------------------


