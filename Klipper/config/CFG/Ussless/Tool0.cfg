# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# RP2040 with "USB" or "CAN bus (on gpio4/gpio5)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

#####################################################################
# 	Mcu Configuration
#####################################################################

[mcu EBBCan]
canbus_uuid: 4d5965523ffb
#canbus_uuid: d62aa84d97e8
#--------------------------------------------------------------------

#[temperature_sensor EBB_NTC]
#sensor_type: Generic 3950
#sensor_pin: EBBCan:gpio28
[temperature_sensor MCuT0]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100
#--------------------------------------------------------------------

#####################################################################
# 	E Stepper Settings
#####################################################################

## E0 Stepper
[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
rotation_distance: 24
gear_ratio: 50:10
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
min_temp: 0
max_temp: 310
sensor_type: ATC Semitec 104NT-4
sensor_pin: EBBCan: PA3
pressure_advance_smooth_time: 0.020


[thermistor ATC Semitec 104NT-4]
temperature1: 150
resistance1: 965
temperature2: 220
resistance2: 230
temperature3: 300
resistance3: 83.8
#--------------------------------------------------------------------


[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.550
stealthchop_threshold: 999999

[autotune_tmc extruder]
motor: moons-cse14hra1l410a
#--------------------------------------------------------------------

#####################################################################
# 	ADXL345 Accelerometer
#####################################################################

[adxl345]
cs_pin: EBBCan: PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z
#--------------------------------------------------------------------

[resonance_tester]
probe_points: 175, 100, 50
accel_chip: adxl345
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0
#--------------------------------------------------------------------

#####################################################################
# 	Fan Control
#####################################################################

[fan]
##	Print Cooling Fan - CNC_FAN0
pin: EBBCan: PA0
kick_start_time: 0.5
off_below: 0.10
#--------------------------------------------------------------------

[heater_fan hotend_fan]
##	Hotend Fan - CNC_FAN1
pin: EBBCan: PA1
heater: extruder
shutdown_speed: 1
heater_temp: 50.0
max_power: 1.0
kick_start_time: 0.5
fan_speed: 1.0
#--------------------------------------------------------------------
